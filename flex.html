<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="flex.css" />

    <title>Document</title>
    <h1>FLEX  STYLE ORDER TYPE</h1>
  </head>
  <body>
    <div class="flex-container">
      <div style="order:4">1</div>
      <div style="order:2">2</div>
      <div style="order:6">3</div>
      <div style="order:3">4</div>
      <div style="order:1">5</div>
      <div style="order:5">6</div>
    </div>

    <div class="flex-container">
      <div style="flex-grow: 1">1</div>
      <div style="flex-grow: 1">2</div>
      <div style="flex-grow: 4">3</div>
    </div>






    <div class="flex-container">
      <div>1</div>
      <div>2</div>
      <div style="flex-shrink: 2">3</div>
      <div>4</div>
      <div>5</div>
      <div style="flex-basis: 250px">6</div>
      </div>
    </div>




    <br />

 
  </body>
</html>
